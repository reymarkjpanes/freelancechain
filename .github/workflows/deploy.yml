# ──────────────────────────────────────────────────────────────────────────────
# FreelanceChain — Continuous Deployment (Vercel)
# Deploys the Next.js frontend to Vercel on every push to main.
# Preview deployments are created for pull requests.
#
# Required secrets (set in GitHub repo Settings → Secrets → Actions):
#   VERCEL_TOKEN       — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — from frontend/.vercel/project.json
#   VERCEL_PROJECT_ID  — from frontend/.vercel/project.json
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_dispatch:       # Manual trigger — run from the Actions tab
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Gate job: check if Vercel secrets are configured
  check-secrets:
    name: 🔐 Check Vercel Secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check for Vercel token
        id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
            echo "✅ Vercel secrets are configured"
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vercel secrets not configured — skipping deployment"
            echo "### ⚠️ Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are not configured." >> $GITHUB_STEP_SUMMARY
            echo "Add them in **Settings → Secrets → Actions** to enable deployments." >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install --force
        working-directory: frontend

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔧 Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build with Vercel
        run: vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "[$URL]($URL)" >> $GITHUB_STEP_SUMMARY

