# ──────────────────────────────────────────────────────────────────────────────
# FreelanceChain — Continuous Deployment (Vercel)
# Deploys the Next.js frontend to Vercel on every push to main.
# Preview deployments are created for pull requests.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔧 Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: 🏗️ Build with Vercel
        run: vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "[$URL]($URL)" >> $GITHUB_STEP_SUMMARY
        working-directory: frontend

      - name: 💬 Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🚀 Preview Deployment\n\nDeployed to: ${{ steps.deploy.outputs.url }}`
            });
